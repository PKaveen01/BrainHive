# Server Configuration
server.port=8080
server.address=127.0.0.1
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.tracking-modes=cookie

# FIXED: Use new property name
spring.web.error.include-message=always

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/brainhive?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - FIXED for Spring Boot 4.x
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.springframework.boot=INFO

# DevTools - DISABLE AUTO RESTART
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false