# Server Configuration
server.port=8080
server.address=127.0.0.1
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.tracking-modes=cookie
spring.web.error.include-message=always

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/brainhive?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
# ⚠️ Each developer must set their own password below
spring.datasource.password=4686991
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.springframework.boot=INFO

# DevTools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.file-size-threshold=0
server.tomcat.max-parameter-count=10000
server.tomcat.max-part-count=50

# Custom upload directory for resources module
file.upload-dir=./src/main/java/com/brainhive/modules/resources/uploads

